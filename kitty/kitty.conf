# ==========================================
# FONTS & CURSOR
# ==========================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
background_opacity 0.50
cursor_shape          block
cursor_blink_interval 0
# Keeps Kitty from overriding your Neovim cursor
shell_integration     no-cursor 

# ==========================================
# WINDOW LAYOUT & SPLITTING (NEOVIM STYLE)
# ==========================================
# Enables Neovim-like splitting
enabled_layouts splits

remember_window_size  no
initial_window_width  1000
initial_window_height 650
window_padding_width  10
confirm_os_window_close 0
hide_window_decorations yes

# --- Splitting Keybinds ---
# Create splits (Opens in the same directory you are currently in)
map ctrl+shift+m launch --location=vsplit --cwd=current
map ctrl+shift+n launch --location=hsplit --cwd=current

# Navigate splits with Vim keys
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize splits dynamically
map ctrl+shift+left resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter

# ==========================================
# PERFORMANCE & MOUSE
# ==========================================
repaint_delay    10
input_delay      3
sync_to_monitor  yes
# Required for Neofetch images to render
allow_remote_control yes
listen_on unix:/tmp/mykitty

detect_urls yes
open_url_with default
copy_on_select yes

# ==========================================
# TABS & BACKGROUND
# ==========================================
# background_opacity 1.0
dynamic_background_opacity yes

# Tab style that complements barbar.nvim
tab_bar_style powerline
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #16161e

# ==========================================
# TOKYONIGHT-NIGHT COLORS
# ==========================================
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #33467c

# Black
color0  #15161e
color8  #414868
# Red
color1  #f7768e
color9  #f7768e
# Green
color2  #9ece6a
color10 #9ece6a
# Yellow
color3  #e0af68
color11 #e0af68
# Blue
color4  #7aa2f7
color12 #7aa2f7
# Magenta
color5  #bb9af7
color13 #bb9af7
# Cyan
color6  #7dcfff
color14 #7dcfff
# White
color7  #a9b1d6
color15 #c0caf5

# --- Window Borders & Gaps ---
# The gap size between split windows
window_margin_width 6

# The thickness of the border line
window_border_width 2pt

# Make the borders invisible by matching the TokyoNight background
active_border_color   #1a1b26
inactive_border_color #1a1b26
bell_border_color     #1a1b26

# Removes the fade effect on inactive splits so the background stays uniform
inactive_text_alpha 1.0
