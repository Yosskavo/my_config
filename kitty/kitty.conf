# ==========================================
# FONT & CURSOR
# ==========================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

cursor_shape          block
cursor_blink_interval 0

# Prevent Kitty from overriding Neovim cursor
shell_integration no-cursor

# ==========================================
# WINDOW APPEARANCE
# ==========================================
background_opacity 0.50
dynamic_background_opacity yes

hide_window_decorations yes
confirm_os_window_close 0

initial_window_width  1000
initial_window_height 650
remember_window_size  no
background_blur 20

placement_strategy center

# Padding (inside window)
window_padding_width 10

# Margin (outside window)
window_margin_width 8

# Borders
draw_minimal_borders no
window_border_width 2pt

active_border_color   #bb9af7
inactive_border_color #414868
bell_border_color     #6e2f44

# Keep background uniform across splits
inactive_text_alpha 1.0

# ==========================================
# SPLITS (NEOVIM STYLE)
# ==========================================
enabled_layouts splits

# Create splits
map ctrl+shift+m launch --location=vsplit --cwd=current
map ctrl+shift+n launch --location=hsplit --cwd=current

# Navigate splits (Vim style)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize splits
map ctrl+shift+left  resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up    resize_window taller
map ctrl+shift+down  resize_window shorter

# Smooth resize animation
resize_draw_strategy scale

# ==========================================
# PERFORMANCE & INPUT
# ==========================================
repaint_delay   10
input_delay     3
sync_to_monitor yes

copy_on_select yes

# Required for things like Neofetch images
allow_remote_control yes
listen_on unix:/tmp/mykitty

detect_urls yes
open_url_with default

# ==========================================
# TABS (POWERLINE STYLE)
# ==========================================
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

tab_bar_background none
tab_bar_margin_width  4
tab_bar_margin_height 4 0

tab_title_template "{index}: {title}"
active_tab_title_template "◉ {index}: {title}"

active_tab_foreground   #1a1b26
active_tab_background   #33467c
inactive_tab_foreground #a9b1d6
inactive_tab_background #414868

# ==========================================
# TOKYONIGHT COLORS
# ==========================================
foreground            #c0caf5
background            #1a1b26

selection_foreground  #c0caf5
selection_background  #33467c

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# ==========================================
# 🔥 VISUAL POLISH (GNOME OPTIMIZED)
# ==========================================

# Transparency (balanced “fake blur” look)
background_opacity 0.85
dynamic_background_opacity yes

# Better spacing (macOS feel)
window_padding_width 12

# Subtle inactive fade (depth effect)
inactive_text_alpha 0.9

# ==========================================
# ✨ CURSOR
# ==========================================
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ==========================================
# ⚡ PERFORMANCE / SMOOTHNESS
# ==========================================
repaint_delay 8
input_delay 2
sync_to_monitor yes

# Smooth scrolling
scrollback_lines 5000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ==========================================
# 🧼 CLEAN UI
# ==========================================
hide_window_decorations yes
tab_bar_min_tabs 2

# Prevent focus issues with mouse
focus_follows_mouse no

# ==========================================
# 🎨 TEXT & RENDERING
# ==========================================
enable_ligatures yes

# Better selection look
selection_foreground none
selection_background #3b4261

# ==========================================
# 🔗 LINKS / UX
# ==========================================
detect_urls yes
underline_hyperlinks always
open_url_with default
