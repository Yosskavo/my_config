# =========================
# Kitty Terminal Configuration
# =========================

# Enable remote control (needed for layout management)
allow_remote_control yes

# -------------------------
# Pane / Window Management
# -------------------------

# Open a new pane (window)
map ctrl+shift+enter new_window

# Close the current pane
map ctrl+shift+w close_window

# -------------------------
# Pane Navigation
# -------------------------
map ctrl+shift+left  focus left
map ctrl+shift+right focus right
map ctrl+shift+up    focus up
map ctrl+shift+down  focus down

# -------------------------
# Pane Resizing
# -------------------------
map ctrl+shift+alt+left  resize_window -10 0
map ctrl+shift+alt+right resize_window +10 0
map ctrl+shift+alt+up    resize_window 0 -5
map ctrl+shift+alt+down  resize_window 0 +5

# -------------------------
# Layouts (vertical/horizontal/grid)
# -------------------------
enabled_layouts splits, tall, grid, stack


# Split vertically (new pane to the right)
map ctrl+shift+l launch --location=vsplit

# Split horizontally (new pane below)
map ctrl+shift+h launch --location=hsplit
# -------------------------
# Optional: fullscreen pane toggle
# -------------------------
map ctrl+shift+f toggle_fullscreen

# =========================
# Notes on Layouts
# =========================
# 'splits' = horizontal split (stacked panes)
# 'tall'   = vertical split (left/right stacked)
# 'grid'   = multiple panes in grid
# 'stack'  = single pane fullscreen (switch between them)


# Enable blur - this is the "Focus" secret for Kitty
# This makes the dimmed background look like frosted glass
background_blur 1

# Ensure dynamic background opacity is allowed
allow_remote_control yes

